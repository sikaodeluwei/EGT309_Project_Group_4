data:
  db_path: "data/gas_monitoring.db"
  table_name: "cleaned_gas_data"
  target_column: "activity level"
  test_size: 0.2
  random_state: 42

tuning:
  Random Forest:
    n_estimators: [100, 250]
    max_depth: [null, 15]
    min_samples_split: [2, 5]
    criterion: ["entropy"]

  Extra Trees:
    n_estimators: [100, 250]
    max_depth: [null, 20]
    min_samples_split: [2, 5]

  Gradient Boosting:
    n_estimators: [100]        # Dropped 200 and 300 to eliminate sequential loops
    learning_rate: [0.1]       # Kept the industry standard default rate
    max_depth: [3]             # Kept shallow trees (super fast to calculate)
    subsample: [0.8]           # Keeps stochastic speed optimization
