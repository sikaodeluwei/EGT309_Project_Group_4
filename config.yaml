# config.yaml
data:
  db_path: "data/gas_monitoring.db"
  table_name: "cleaned_gas_data"
  target_column: "activity level"
  test_size: 0.2
  random_state: 42

tuning:
  Random Forest:
    n_estimators: [100, 200]
    max_depth: [10, 20, null]
    min_samples_split: [2, 5]
    
  Extra Trees:
    n_estimators: [100, 200]
    max_depth: [10, 20, null]
    
  Gradient Boosting:
    n_estimators: [100, 150]
    learning_rate: [0.05, 0.1]
    max_depth: [3, 5]
